@if (hasRouting) {
	<a tuiAction [routerLink]="link">
		<ng-container *ngTemplateOutlet="content"></ng-container>
	</a>
} @else {
	<tui-loader [showLoader]="isLoading" [overlay]="isLoading">
		<button tuiAction (click)="onClick()">
			@if (!isLoading) {
				<ng-container *ngTemplateOutlet="content"></ng-container>
			}
		</button>
	</tui-loader>
}

<ng-template #content>
	<i [ngClass]="['ph-duotone', icon]"></i>
	<span>{{ name }}</span>
</ng-template>
