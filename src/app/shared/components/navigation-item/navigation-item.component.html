@if (hasRouting) {
	<a tuiAction [routerLink]="link">
		<ng-container *ngTemplateOutlet="content"></ng-container>
	</a>
} @else {
	<button tuiAction>
		<ng-container *ngTemplateOutlet="content"></ng-container>
	</button>
}

<ng-template #content>
	<i [ngClass]="['ph-duotone', icon]"></i>
	<span>{{ name }}</span>
</ng-template>
